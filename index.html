<!DOCTYPE html>
<html lang="fr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forceux Académie — Comparateur de Force</title>
    <meta property="og:title" content="Forceux Académie — Comparateur de Force">
    <meta property="og:description" content="Compare ta force avec +350k compétiteurs réels. Découvre ton rang : Novice, Intermédiaire, Avancé, Expert, Élite ou Légendaire.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Forceux Académie — Comparateur de Force">
    <meta name="twitter:description" content="Compare ta force avec +350k compétiteurs réels. Découvre ton rang mondial en Squat, Bench et Deadlift.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter','sans-serif'] },
                colors: { forceux: { 500:'#E63946', 600:'#D62835' } }
            }}
        }
    </script>
    <style>
        body { background-color:#09090b; background-image: radial-gradient(circle at 15% 50%,rgba(230,57,70,.05),transparent 25%), radial-gradient(circle at 85% 30%,rgba(230,57,70,.08),transparent 25%); color:#f4f4f5; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
        input[type="number"] { -moz-appearance:textfield; }
        input[type="number"]:focus, select:focus { outline:none !important; border-color:#E63946 !important; box-shadow:0 0 0 2px rgba(230,57,70,.25),0 0 16px rgba(230,57,70,.18) !important; }

        @keyframes rankReveal {
            0%  { opacity:0; transform:scale(0.3) rotate(-15deg); }
            60% { transform:scale(1.18) rotate(4deg); }
            80% { transform:scale(0.94) rotate(-2deg); }
            100%{ opacity:1; transform:scale(1) rotate(0deg); }
        }
        .rank-icon-reveal { animation:rankReveal .75s cubic-bezier(.34,1.56,.64,1) forwards; }

        .rank-glow-gray    { color:#a1a1aa; text-shadow:0 0 24px rgba(161,161,170,.5),0 0 48px rgba(161,161,170,.25); }
        .rank-glow-blue    { color:#60a5fa; text-shadow:0 0 24px rgba(96,165,250,.6),0 0 48px rgba(96,165,250,.3); }
        .rank-glow-amber   { color:#fbbf24; text-shadow:0 0 24px rgba(251,191,36,.6),0 0 48px rgba(251,191,36,.3); }
        .rank-glow-red     { color:#f87171; text-shadow:0 0 24px rgba(248,113,113,.7),0 0 56px rgba(248,113,113,.35); }
        .rank-glow-violet  { color:#a78bfa; text-shadow:0 0 24px rgba(167,139,250,.7),0 0 56px rgba(167,139,250,.35); }
        .rank-glow-gold    { background:linear-gradient(90deg,#fbbf24,#f59e0b,#fcd34d,#f59e0b,#fbbf24); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:goldShimmer 2.5s linear infinite; filter:drop-shadow(0 0 18px rgba(251,191,36,.6)); }
        @keyframes goldShimmer { 0%{background-position:0% center} 100%{background-position:200% center} }

        @keyframes barFill { from{width:0%} }
        .bar-fill { animation:barFill 1s cubic-bezier(.22,1,.36,1) forwards; }
        .bar-1{animation-delay:.5s} .bar-2{animation-delay:.68s} .bar-3{animation-delay:.86s}

        @keyframes confettiFall {
            0%  { transform:translateY(-20px) rotate(0deg) scaleX(1); opacity:1; }
            80% { opacity:1; }
            100%{ transform:translateY(100vh) rotate(720deg) scaleX(-1); opacity:0; }
        }
        .confetti-piece { position:fixed; top:-20px; pointer-events:none; animation:confettiFall linear forwards; z-index:9999; border-radius:2px; }

        @keyframes particleRise {
            0%  { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
            100%{ transform:translateY(-100vh) rotate(720deg) scale(.3); opacity:0; }
        }
        .particle { position:fixed; bottom:-20px; pointer-events:none; border-radius:50%; animation:particleRise linear forwards; z-index:9999; }

        .tier-dot { width:10px; height:10px; border-radius:50%; transition:all .3s ease; }
        .tier-dot.lit { box-shadow:0 0 8px 2px currentColor; }
        .tier-dot.dim { opacity:.2; }

        .toggle-btn { transition:all .2s ease; }
        .toggle-btn.active  { background:#E63946; color:#fff; box-shadow:0 0 12px rgba(230,57,70,.4); }
        .toggle-btn.inactive{ background:transparent; color:#71717a; }

        .legendary-milestone { background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(245,158,11,.06),rgba(252,211,77,.12)); border:1px solid rgba(251,191,36,.35); animation:legendaryPulse 3s ease-in-out infinite; }
        @keyframes legendaryPulse { 0%,100%{box-shadow:0 0 20px rgba(251,191,36,.15)} 50%{box-shadow:0 0 36px rgba(251,191,36,.35)} }

        /* ── Sticky CTA mobile ── */
        #stickyCta { transform:translateY(100%); transition:transform .4s cubic-bezier(.22,1,.36,1); }
        #stickyCta.visible { transform:translateY(0); }

        /* ── Division pill ── */
        .division-pill { transition:all .2s ease; }

        /* ── GL tooltip ── */
        .gl-tooltip { position:relative; display:inline-flex; align-items:center; cursor:help; }
        .gl-tooltip .gl-tip { visibility:hidden; opacity:0; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); width:220px; background:#18181b; border:1px solid #3f3f46; border-radius:10px; padding:10px 12px; font-size:11px; line-height:1.5; color:#a1a1aa; transition:opacity .2s; z-index:100; pointer-events:none; }
        .gl-tooltip:hover .gl-tip, .gl-tooltip:focus .gl-tip { visibility:visible; opacity:1; }

        /* ── History panel ── */
        #historyPanel { display:none; }
        #historyPanel.open { display:block; }

        /* ── Badge ── */

        @keyframes fadeInUp {
            from{opacity:0;transform:translateY(20px)}
            to  {opacity:1;transform:translateY(0)}
        }

        /* ── Progress rank bar ── */
        @keyframes rankBarFill { from{width:0%} }
        .rank-progress-fill { animation:rankBarFill 1.2s cubic-bezier(.22,1,.36,1) .3s forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 pb-24">
<div id="particleContainer"></div>

<div class="w-full max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8" style="animation:fadeInUp .5s ease-out forwards">
        <div class="inline-flex items-center justify-center mb-5">
            <img src="logo-rond.png" alt="Forceux Académie"
                 onerror="if(!this.processed){this.processed=true;this.src='logo-rond.jpg';}else{this.src='https://placehold.co/120x120/1c1c1e/ffffff?text=FA';}"
                 class="w-24 h-24 rounded-full border-2 border-forceux-500/80 shadow-[0_0_25px_rgba(230,57,70,0.35)] object-cover">
        </div>
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-white px-2 leading-tight">
            Compare ta force avec le <span class="text-transparent bg-clip-text" style="background-image:linear-gradient(to right,#E63946,#fb7083)">reste du monde</span>
        </h1>
        <p class="text-zinc-500 text-sm mt-2 font-medium">Basé sur les performances de +350k compétiteurs vérifiés</p>
    </div>

    <!-- Main Card -->
    <div class="bg-zinc-900/80 backdrop-blur-xl border border-zinc-800/80 rounded-3xl p-6 sm:p-8 shadow-2xl relative z-10" style="animation:fadeInUp .6s ease-out forwards">
        <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-zinc-600/50 to-transparent"></div>

        <!-- FORM -->
        <div id="formZone" class="space-y-6">
            <!-- Genre -->
            <div>
                <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Genre</label>
                <div class="relative">
                    <select id="sexe" class="w-full bg-zinc-950/50 border border-zinc-800 text-white text-sm rounded-xl block p-4 transition-all appearance-none cursor-pointer font-medium">
                        <option value="M">Homme</option>
                        <option value="F">Femme</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                </div>
            </div>

            <!-- Âge + Poids -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Âge</label>
                    <div class="relative">
                        <input type="number" id="age" placeholder="25" min="12" max="99" step="1" inputmode="numeric"
                               class="w-full bg-zinc-950/50 border border-zinc-800 text-white rounded-xl block p-4 pl-12 transition-all font-semibold text-lg placeholder-zinc-700">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-zinc-500 font-medium text-sm">ans</div>
                    </div>

                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Poids de corps</label>
                    <div class="relative">
                        <input type="number" id="poids" placeholder="80" min="30" max="250" step="0.5" inputmode="decimal"
                               class="w-full bg-zinc-950/50 border border-zinc-800 text-white rounded-xl block p-4 pl-12 transition-all font-semibold text-lg placeholder-zinc-700">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-zinc-500 font-medium text-sm">kg</div>
                    </div>
                </div>
            </div>

            <!-- Lifts -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Squat</label>
                    <div class="relative">
                        <input type="number" id="sq" placeholder="0" min="0" step="0.5" inputmode="decimal"
                               class="w-full bg-zinc-950/50 border border-zinc-800 text-white rounded-xl block p-4 pl-10 transition-all font-semibold text-lg placeholder-zinc-700">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-zinc-500 font-medium text-xs">kg</div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Bench</label>
                    <div class="relative">
                        <input type="number" id="bp" placeholder="0" min="0" step="0.5" inputmode="decimal"
                               class="w-full bg-zinc-950/50 border border-zinc-800 text-white rounded-xl block p-4 pl-10 transition-all font-semibold text-lg placeholder-zinc-700">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-zinc-500 font-medium text-xs">kg</div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-zinc-400 uppercase mb-2 ml-1">Deadlift</label>
                    <div class="relative">
                        <input type="number" id="dl" placeholder="0" min="0" step="0.5" inputmode="decimal"
                               class="w-full bg-zinc-950/50 border border-zinc-800 text-white rounded-xl block p-4 pl-10 transition-all font-semibold text-lg placeholder-zinc-700">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-zinc-500 font-medium text-xs">kg</div>
                    </div>
                </div>
            </div>

            <!-- Analyser -->
            <button onclick="comparer()" class="w-full relative group mt-2">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-forceux-500 to-rose-500 rounded-xl blur opacity-30 group-hover:opacity-60 transition duration-300"></div>
                <div class="relative w-full bg-gradient-to-r from-forceux-500 to-forceux-600 hover:from-forceux-600 hover:to-rose-600 text-white font-bold text-lg py-4 px-8 rounded-xl transition-all duration-200 group-active:scale-[.98] flex items-center justify-center gap-2 shadow-lg">
                    <span>Analyser ma force</span>
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
            </button>

            <!-- History toggle -->
            <div id="historyToggleBtn" class="hidden">
                <button onclick="toggleHistory()" class="w-full flex items-center justify-between py-3 px-4 bg-zinc-950/40 border border-zinc-800 rounded-xl text-sm text-zinc-400 hover:text-white hover:border-zinc-600 transition-all">
                    <span class="flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Historique de mes analyses
                    </span>
                    <svg id="historyChevron" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="historyPanel" class="mt-2 space-y-2"></div>
            </div>
        </div>

        <!-- RESULTS -->
        <div id="resultatContainer" class="hidden">
            <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-zinc-800 to-transparent my-8"></div>

            <!-- Toggle -->
            <div class="flex items-center justify-center mb-6">
                <div class="flex bg-zinc-950/60 border border-zinc-800 rounded-xl p-1 gap-1">
                    <button id="toggleWW" onclick="setZone('WW')" class="toggle-btn active px-5 py-2 rounded-lg text-sm font-bold tracking-wide">🌍 Monde</button>
                    <button id="toggleFR" onclick="setZone('FR')" class="toggle-btn inactive px-5 py-2 rounded-lg text-sm font-bold tracking-wide">🇫🇷 France</button>
                </div>
            </div>

            <div id="rankRevealZone"></div>
            <div id="resultat" class="space-y-6 mt-8"></div>

            <!-- Radar -->
            <div id="radarWrap" class="relative h-[300px] sm:h-[360px] w-full mt-8 bg-zinc-950/30 rounded-2xl p-4 border border-zinc-800/50 hidden">
                <canvas id="radarChart"></canvas>
            </div>

            <div id="ctaZone" class="mt-8"></div>

            <button onclick="recommencer()" class="w-full mt-4 py-3 px-6 rounded-xl border border-zinc-700 text-zinc-400 text-sm font-semibold hover:border-zinc-500 hover:text-white transition-all">
                ↩ Modifier mes données
            </button>
        </div>
    </div>

    <p class="text-center text-zinc-600 text-xs mt-8 font-medium">
        Basé sur données de <a href="https://www.openipf.org" target="_blank" rel="noopener noreferrer" class="hover:text-forceux-500 underline transition-colors">Openipf.org</a>
    </p>
</div>

<!-- Sticky CTA mobile -->
<div id="stickyCta" class="fixed bottom-0 left-0 right-0 z-50 p-3 sm:hidden" style="background:linear-gradient(to top,#09090b,transparent)">
    <a id="stickyCtaLink" href="https://www.forceux.fr/" target="_blank" rel="noopener noreferrer"
       class="flex items-center justify-center w-full text-white font-bold py-3.5 px-6 rounded-xl shadow-lg text-sm active:scale-[.98] transition-all"
       style="background:linear-gradient(135deg,#E63946,#D62835);box-shadow:0 4px 24px rgba(230,57,70,.4);">
        Découvrir Forceux Académie →
    </a>
</div>

// ── Division mapping ──────────────────────────────────────────────────────────
function getDivision(age) {
    const a = parseInt(age);
    if (a < 18)  return 'Sub-Junior';
    if (a <= 23) return 'Junior';
    if (a <= 39) return 'Open';
    if (a <= 49) return 'Masters 1';
    if (a <= 59) return 'Masters 2';
    return 'Masters 3';
}

// ── IPF official categories ──────────────────────────────────────────────────
const IPF_CATS = {
    M: ['59','66','74','83','93','105','120','120+'],
    F: ['47','52','57','63','69','76','84','84+']
};

function getIpfCat(sexe, poids) {
    const p = parseFloat(poids);
    const cats = IPF_CATS[sexe];
    for (const cat of cats) {
        if (cat.endsWith('+')) return cat;           // last open-ended cat
        if (p <= parseFloat(cat)) return cat;
    }
    return cats[cats.length - 1];
}

function lookup(sexe, division, poids, zone) {
    const cat = getIpfCat(sexe, poids);
    const key = `${sexe}_${division}_${cat}_${zone}`;
    return DB[key] ? { ...DB[key], _cat: cat } : null;
}

    if (pct >= 100) return 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30';
    if (pct >= 80)  return 'bg-amber-500/10 text-amber-400 border border-amber-500/30';
    return 'bg-rose-500/10 text-rose-400 border border-rose-500/30';
}

        const p=document.createElement('div'); p.className='confetti-piece';
        const w=6+Math.random()*10, h=w*(.4+Math.random()*.6), col=CCOLORS[Math.floor(Math.random()*CCOLORS.length)];
        p.style.cssText=`width:${w}px;height:${h}px;left:${Math.random()*100}vw;background:${col};animation-duration:${2.4+Math.random()*2.2}s;animation-delay:${Math.random()*.9}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
        c.appendChild(p); p.addEventListener('animationend',()=>p.remove());
    }
}
function spawnParticles(col) {
    const c=document.getElementById('particleContainer');
    for(let i=0;i<28;i++){
        const p=document.createElement('div'); p.className='particle';
        const s=8+Math.random()*14;
        p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;background:${col};animation-duration:${2.2+Math.random()*2.4}s;animation-delay:${Math.random()*.8}s;opacity:.85;box-shadow:0 0 ${s}px ${col};`;
        c.appendChild(p); p.addEventListener('animationend',()=>p.remove());
    }
}

// ── Count-up ──────────────────────────────────────────────────────────────────
function animateCount(el, target, duration=1100) {
    if (!el) return;
    const start=performance.now();
    (function step(now){
        const t=Math.min((now-start)/duration,1), ease=1-Math.pow(1-t,3);
        el.textContent=Math.round(ease*target);
        if(t<1) requestAnimationFrame(step);
    })(performance.now());
}

// ── Toggle ────────────────────────────────────────────────────────────────────
function setZone(zone) {
    currentZone=zone;
    document.getElementById('toggleWW').className=`toggle-btn ${zone==='WW'?'active':'inactive'} px-5 py-2 rounded-lg text-sm font-bold tracking-wide`;
    document.getElementById('toggleFR').className=`toggle-btn ${zone==='FR'?'active':'inactive'} px-5 py-2 rounded-lg text-sm font-bold tracking-wide`;
    if(lastInputs) renderResults(lastInputs);
}

// ── Recommencer ───────────────────────────────────────────────────────────────
function recommencer() {
    hasRevealedOnce = false;
    document.getElementById('formZone').classList.remove('opacity-50','pointer-events-none');
    document.getElementById('resultatContainer').classList.add('hidden');
    document.getElementById('stickyCta').classList.remove('visible');
    window.scrollTo({top:0,behavior:'smooth'});
}

// ── History (localStorage) ────────────────────────────────────────────────────
function loadHistory() {
    try { return JSON.parse(localStorage.getItem('forceux_history') || '[]'); } catch{ return []; }
}
function saveToHistory(entry) {
    let h = loadHistory();
    h.unshift(entry);
    h = h.slice(0, MAX_HISTORY);
    try { localStorage.setItem('forceux_history', JSON.stringify(h)); } catch{}
    renderHistoryPanel();
}
function renderHistoryPanel() {
    const h = loadHistory();
    const btn = document.getElementById('historyToggleBtn');
    const panel = document.getElementById('historyPanel');
    if (!h.length) { btn.classList.add('hidden'); return; }
    btn.classList.remove('hidden');
    panel.innerHTML = h.map((e, i) => {
        const rank = getRank(e.pctTotal);
        return `<div class="flex items-center gap-3 p-3 bg-zinc-950/50 border border-zinc-800 rounded-xl cursor-pointer hover:border-zinc-600 transition-all" onclick="reloadHistory(${i})">
            <span class="text-2xl">${rank.icon}</span>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-white">${rank.label} · ${e.total} kg</p>
                <p class="text-[10px] text-zinc-500">${e.sexeLabel} · ${e.division} · cat. ${e.cat} kg · ${e.zone==='WW'?'🌍 Monde':'🇫🇷 France'}</p>
            </div>
            <p class="text-[10px] text-zinc-600 shrink-0">${e.date}</p>
        </div>`;
    }).join('');
}
function toggleHistory() {
    const panel = document.getElementById('historyPanel');
    const chevron = document.getElementById('historyChevron');
    panel.classList.toggle('open');
    chevron.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : '';
}
function reloadHistory(i) {
    const e = loadHistory()[i];
    if (!e) return;
    document.getElementById('sexe').value  = e.sexe;
    document.getElementById('age').value   = e.age;
    document.getElementById('poids').value = e.poids;
    document.getElementById('sq').value    = e.vSq;
    document.getElementById('bp').value    = e.vBp;
    document.getElementById('dl').value    = e.vDl;
    currentZone = e.zone;
    comparer();
}

// ── Comparer ──────────────────────────────────────────────────────────────────
function comparer() {
    const sexe  = document.getElementById('sexe').value;
    const age   = document.getElementById('age').value;
    const poids = document.getElementById('poids').value;
    const vSq   = parseFloat(document.getElementById('sq').value)||0;
    const vBp   = parseFloat(document.getElementById('bp').value)||0;
    const vDl   = parseFloat(document.getElementById('dl').value)||0;
    const total = vSq+vBp+vDl;
    if(!age||!poids||total===0){ alert('Merci de renseigner ton âge, ton poids de corps et au moins un lift.'); return; }
    lastInputs = {sexe, age, poids, vSq, vBp, vDl, total};
    hasRevealedOnce = false;
    document.getElementById('formZone').classList.add('opacity-50','pointer-events-none');
    const rc = document.getElementById('resultatContainer');
    rc.classList.remove('hidden');
    rc.style.animation='fadeInUp .5s ease-out forwards';
    setTimeout(()=>rc.scrollIntoView({behavior:'smooth',block:'start'}),80);
    renderResults(lastInputs);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults({sexe, age, poids, vSq, vBp, vDl, total}) {
    const division = getDivision(age);
    const zone     = currentZone;
    const ref      = lookup(sexe, division, poids, zone);
    const cat      = ref ? ref._cat : getIpfCat(sexe, poids);
    const sexeLabel = sexe==='M'?'Homme':'Femme';
    const zoneLabel = zone==='WW'?'🌍 Monde':'🇫🇷 France';

    const rankZone   = document.getElementById('rankRevealZone');
    const resContent = document.getElementById('resultat');
    const ctaZone    = document.getElementById('ctaZone');

    // ── No data ───────────────────────────────────────────────────────────────
    if (!ref) {
        rankZone.innerHTML='';
        resContent.innerHTML=`
            <div class="p-5 bg-amber-500/10 border border-amber-500/20 rounded-2xl text-center space-y-2">
                <p class="text-amber-400 font-bold text-base">Aucune donnée disponible</p>
                <p class="text-zinc-400 text-sm">Aucune référence pour : <strong class="text-white">${sexeLabel} · ${division} · cat. ${cat} kg · ${zone==='WW'?'🌍 Monde':'🇫🇷 France'}</strong></p>
                <p class="text-zinc-500 text-xs">Les données pour cette catégorie ne sont pas encore disponibles pour cette zone. Essaie de basculer le toggle.</p>
            </div>`;
        ctaZone.innerHTML='';
        document.getElementById('radarWrap').classList.add('hidden');
        if(myChart) myChart.destroy();
        return;
    }

    // ── Calculs ───────────────────────────────────────────────────────────────
    const pctTotal = parseFloat(((total/ref.Total)*100).toFixed(1));
    const pctSq    = parseFloat(((vSq/ref.Squat)*100).toFixed(1));
    const pctBp    = parseFloat(((vBp/ref.Bench)*100).toFixed(1));
    const pctDl    = parseFloat(((vDl/ref.Deadlift)*100).toFixed(1));
    const rank     = getRank(pctTotal);
    const glRef    = ref.Goodlift;
    const glUser   = total>0 ? ((total/ref.Total)*glRef).toFixed(1) : 0;
    const glPct    = Math.min(Math.round((glUser/glRef)*100), 160);

    // ── Percentile ────────────────────────────────────────────────────────────
    function estimatePercentile(pct) {
        if(pct<=0) return 1; if(pct>=200) return 99;
        const anchors=[[0,1],[60,10],[86,30],[100,50],[106,65],[126,85],[146,95],[200,99]];
        for(let i=1;i<anchors.length;i++){
            const [p0,pc0]=anchors[i-1],[p1,pc1]=anchors[i];
            if(pct<=p1) return Math.round(pc0+(pct-p0)/(p1-p0)*(pc1-pc0));
        }
        return 99;
    }
    const percentile = estimatePercentile(pctTotal);

    // ── Weakest lift ──────────────────────────────────────────────────────────
    const liftDeficits = [
        {name:'Squat',   val:vSq, avg:ref.Squat,    deficit:ref.Squat-vSq},
        {name:'Bench',   val:vBp, avg:ref.Bench,    deficit:ref.Bench-vBp},
        {name:'Deadlift',val:vDl, avg:ref.Deadlift, deficit:ref.Deadlift-vDl},
    ].filter(l=>l.val>0);
    const weakestLift = liftDeficits.length>0 ? liftDeficits.reduce((a,b)=>a.deficit>b.deficit?a:b) : null;

    // ── Tier dots ─────────────────────────────────────────────────────────────
    const tierDots = RANKS.map((r,i)=>{
        const active=RANKS.indexOf(rank)>=i;
        return `<div class="tier-dot ${active?'lit':'dim'}" style="background:${r.hex};color:${r.hex}" title="${r.label}"></div>`;
    }).join('');

    // ── Rank progress bar ─────────────────────────────────────────────────────
    const rankIndex=RANKS.indexOf(rank), nextRank=RANKS[rankIndex+1];
    const rankMin=rank.minPct, rankMax=nextRank?nextRank.minPct:rank.minPct+20;
    const rankProgressPct=Math.min(Math.max(((pctTotal-rankMin)/(rankMax-rankMin))*100,0),100);

    // ── Rank Reveal ───────────────────────────────────────────────────────────
    rankZone.innerHTML=`
        <div class="text-center py-6 space-y-4">
            <div class="relative inline-block">
                <div id="rankIcon" class="text-7xl sm:text-8xl leading-none rank-icon-reveal" style="opacity:0">${rank.icon}</div>
                <div style="width:90%;height:40px;margin:0 auto;background:${rank.hex};border-radius:50%;filter:blur(22px);opacity:0.6;margin-top:-14px;pointer-events:none;"></div>
            </div>
            <div>
                <p class="text-xs font-bold tracking-widest text-zinc-500 uppercase mb-1">Rang atteint</p>
                <div class="text-4xl sm:text-5xl font-black ${rank.colorClass}">${rank.label.toUpperCase()}</div>
            </div>
            <div class="flex items-center justify-center gap-2.5 pt-1">${tierDots}</div>
            <p class="text-xs text-zinc-600 font-medium">${rankIndex+1} / ${RANKS.length} niveaux · ${sexeLabel} · ${division} · cat. ${cat} kg</p>
            <div class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-bold" style="background:${rank.hex}18;border:1px solid ${rank.hex}35;color:${rank.hex}">
                🎯 Tu surpasses ${percentile}% des athlètes de ta catégorie
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4 max-w-xs mx-auto">
                <div class="bg-zinc-950/60 border border-zinc-800 rounded-2xl p-4 text-center">
                    <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-1">Total soulevé</p>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="countUpEl" class="text-3xl font-black text-white tracking-tighter">0</span>
                        <span class="text-base text-zinc-500 font-semibold">kg</span>
                    </div>
                </div>
                <div class="bg-zinc-950/60 border border-zinc-800 rounded-2xl p-4 text-center">
                    <div class="gl-tooltip">
                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-1">GL Points
                            <svg class="w-3 h-3 inline text-zinc-600 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>
                        </p>
                        <div class="gl-tip">Mesure ta performance indépendamment du poids de corps. 100 = niveau moyen compétiteur. Calculé avec la formule IPF GL.</div>
                    </div>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="glEl" class="text-3xl font-black tracking-tighter" style="color:${rank.hex}">0</span>
                        <span class="text-[10px] text-zinc-600 font-semibold self-end mb-0.5">GL</span>
                    </div>
                </div>
            </div>
            <div class="max-w-xs mx-auto">
                <div class="flex justify-between text-xs mb-1.5">
                    <span class="font-bold text-zinc-400">Score GL</span>
                    <span class="text-zinc-500">Réf. catégorie : <strong class="text-white">${glRef}</strong></span>
                </div>
                <div class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full rounded-full bar-fill bar-1" style="width:${Math.min(glPct,100)}%;background:${rank.hex};box-shadow:0 0 8px ${rank.hex}66;"></div>
                </div>
            </div>
            ${nextRank?`
            <div class="max-w-xs mx-auto">
                <div class="flex justify-between text-xs mb-1.5">
                    <span class="text-zinc-600">Progression vers <span style="color:${nextRank.hex}">${nextRank.label}</span></span>
                    <span class="text-zinc-500">${Math.round(rankProgressPct)}%</span>
                </div>
                <div class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full rounded-full rank-progress-fill" style="width:${rankProgressPct}%;background:linear-gradient(to right,${rank.hex},${nextRank.hex});box-shadow:0 0 8px ${rank.hex}66;"></div>
                </div>
            </div>`:''}
        </div>`;

    setTimeout(()=>animateCount(document.getElementById('countUpEl'),total),200);
    setTimeout(()=>animateCount(document.getElementById('glEl'),parseFloat(glUser)),200);
    if(!hasRevealedOnce){
        hasRevealedOnce=true;
        setTimeout(()=>spawnConfetti(),350);
        if(rank.key==='elite'||rank.key==='legendaire') setTimeout(()=>spawnParticles(rank.hex),600);
    }

    // ── Save history ──────────────────────────────────────────────────────────
    saveToHistory({sexe,sexeLabel,age,poids,vSq,vBp,vDl,total,division,cat,zone,pctTotal,
        date:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})});

    // ── Progress bars ─────────────────────────────────────────────────────────
    const lifts=[
        {name:'Squat',   val:vSq,avg:ref.Squat,   pct:pctSq},
        {name:'Bench',   val:vBp,avg:ref.Bench,   pct:pctBp},
        {name:'Deadlift',val:vDl,avg:ref.Deadlift,pct:pctDl},
    ];
    const progressBars=lifts.map((l,i)=>{
        const cPct=Math.min(l.pct,160),color=barColor(l.pct);
        const deficit=l.avg-l.val;
        const hint=l.pct>=100
            ?`<span class="text-emerald-400 font-medium">✓ Au-dessus de la moyenne (${l.avg} kg)</span>`
            :`<span class="text-zinc-500">Il te manque <strong class="text-white">${Math.abs(deficit).toFixed(1)} kg</strong> pour atteindre la moyenne (<strong class="text-zinc-400">${l.avg} kg</strong>)</span>`;
        return `<div>
            <div class="flex justify-between text-xs mb-1.5">
                <span class="font-bold text-zinc-300">${l.name}</span>
                <span class="font-semibold" style="color:${color}">${l.pct.toFixed(1)}%</span>
            </div>
            <div class="w-full h-2.5 bg-zinc-800 rounded-full overflow-hidden">
                <div class="h-full rounded-full bar-fill bar-${i+1}" style="width:${cPct}%;background:${color};box-shadow:0 0 8px ${color}66;"></div>
            </div>
            <p class="text-xs mt-1">${hint}</p>
        </div>`;
    }).join('');

    // ── Milestone ─────────────────────────────────────────────────────────────
    let milestoneHTML='';
    if(nextRank){
        const needed=Math.ceil(ref.Total*(nextRank.minPct/100)-total);
        milestoneHTML=`
            <div class="mt-2 rounded-2xl" style="border:1px solid ${nextRank.hex}40;background:#111113;">
                <div class="p-4 flex items-center gap-4">
                    <div class="flex-shrink-0 w-11 h-11 rounded-xl flex items-center justify-center text-2xl" style="background:${nextRank.hex}18;border:1px solid ${nextRank.hex}30;">${nextRank.icon}</div>
                    <div>
                        <p class="text-[10px] font-bold tracking-widest uppercase mb-0.5" style="color:${nextRank.hex}">Prochain rang : ${nextRank.label.toUpperCase()}</p>
                        <p class="text-sm text-zinc-300">Il te manque <strong class="text-white font-black">+${needed} kg</strong> au total pour franchir ce palier.</p>
                    </div>
                </div>
            </div>`;
    } else {
        milestoneHTML=`
            <div class="legendary-milestone rounded-2xl p-4 mt-2 text-center">
                <span class="text-2xl">⚜️</span>
                <p class="font-black text-lg rank-glow-gold mt-1">Rang maximum atteint !</p>
                <p class="text-sm text-zinc-400 mt-1">Tu as atteint le sommet absolu.</p>
            </div>`;
    }

    // ── Main content ──────────────────────────────────────────────────────────
    resContent.innerHTML=`
        <div class="bg-zinc-950/50 border border-zinc-800 p-4 rounded-2xl flex items-center justify-between hover:border-zinc-700 transition-colors">
            <div>
                <p class="text-xs text-zinc-500 font-semibold uppercase tracking-wider mb-1">Total vs ${zoneLabel}</p>
                <div class="flex items-center gap-1.5">
                    <span class="text-2xl font-bold text-white">${pctTotal}%</span>
                    <span class="text-xs text-zinc-500">(Moy: ${ref.Total} kg)</span>
                </div>
            </div>
            <div class="p-3 bg-zinc-900 rounded-xl">${getArrow(pctTotal)}</div>
        </div>
        <div class="bg-zinc-950/40 border border-zinc-800/60 rounded-2xl p-5 space-y-4">
            <h4 class="text-xs font-bold tracking-wider text-zinc-500 uppercase">Progression vs ${zoneLabel}</h4>
            ${progressBars}
        </div>
        ${milestoneHTML}`;

    // ── Radar ─────────────────────────────────────────────────────────────────
    document.getElementById('radarWrap').classList.remove('hidden');
    const ctx=document.getElementById('radarChart').getContext('2d');
    if(myChart) myChart.destroy();
    const gBg=ctx.createRadialGradient(0,0,0,0,0,150);
    gBg.addColorStop(0,'rgba(230,57,70,.5)'); gBg.addColorStop(1,'rgba(230,57,70,.1)');
    myChart=new Chart(ctx,{type:'radar',data:{labels:['Squat','Bench','Deadlift'],datasets:[
        {label:' Toi',data:[vSq,vBp,vDl],backgroundColor:gBg,borderColor:'#E63946',borderWidth:3,pointBackgroundColor:'#fff',pointBorderColor:'#E63946',pointBorderWidth:2,pointRadius:4,pointHoverRadius:6,fill:true,order:1},
        {label:` Moy ${zoneLabel}`,data:[ref.Squat,ref.Bench,ref.Deadlift],borderColor:'#10B981',backgroundColor:'rgba(16,185,129,.15)',borderWidth:2,pointBackgroundColor:'#10B981',pointRadius:3,fill:true,order:2}
    ]},options:{maintainAspectRatio:false,responsive:true,
        plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:12,weight:'500'},color:'#a1a1aa',usePointStyle:true,padding:20}},
            tooltip:{backgroundColor:'rgba(24,24,27,.95)',titleFont:{family:'Inter',size:13,weight:'700'},bodyFont:{family:'Inter',size:13},padding:12,cornerRadius:8,borderColor:'rgba(63,63,70,.5)',borderWidth:1,displayColors:false,callbacks:{label:(c)=>c.dataset.label+': '+c.raw+' kg'}}},
        scales:{r:{angleLines:{color:'rgba(63,63,70,.3)'},grid:{color:'rgba(63,63,70,.3)'},pointLabels:{font:{family:'Inter',size:13,weight:'600'},color:'#f4f4f5'},ticks:{color:'#71717a',backdropColor:'transparent',font:{size:10},stepSize:40,suggestedMin:0}}},
        animation:{duration:1000,easing:'easeOutQuart'}}});

    // ── CTA ───────────────────────────────────────────────────────────────────
    let ctaBody=rank.body;
    if(weakestLift&&weakestLift.deficit>0){
        ctaBody=`${rank.body} <span class="block mt-2 text-xs opacity-75">💡 Focus sur ton <strong>${weakestLift.name}</strong> : +${weakestLift.deficit.toFixed(1)} kg te fait passer au rang supérieur.</span>`;
    }
    ctaZone.innerHTML=`
        <div class="rounded-2xl p-6 relative overflow-hidden border text-center" style="background:linear-gradient(135deg,${rank.hex}18,rgba(9,9,11,.95));border-color:${rank.hex}35;">
            <div class="relative z-10">
                <p class="text-xs font-bold tracking-widest uppercase mb-1" style="color:${rank.hex}">${rank.icon} Rang ${rank.label}</p>
                <h3 class="text-xl font-extrabold text-white mb-2">${rank.headline}</h3>
                <p class="text-zinc-400 text-sm mb-5 max-w-sm mx-auto">${ctaBody}</p>
                <a href="https://www.forceux.fr/" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center justify-center w-full text-white font-bold py-3.5 px-6 rounded-xl active:scale-[.98] shadow-lg"
                   style="background:linear-gradient(135deg,${rank.hex},${rank.hex}cc);box-shadow:0 4px 24px ${rank.btnGlow};transition:transform 0.2s ease,box-shadow 0.2s ease;"
                   onmouseover="this.style.transform='translateY(-2px) scale(1.015)';this.style.boxShadow='0 10px 40px ${rank.btnGlow}'"
                   onmouseout="this.style.transform='';this.style.boxShadow='0 4px 24px ${rank.btnGlow}'">
                    ${rank.btn}
                </a>
            </div>
        </div>`;

    // ── Sticky CTA ────────────────────────────────────────────────────────────
    const stickyLink=document.getElementById('stickyCtaLink');
    stickyLink.style.background=`linear-gradient(135deg,${rank.hex},${rank.hex}cc)`;
    stickyLink.style.boxShadow=`0 4px 24px ${rank.btnGlow}`;
    stickyLink.textContent=rank.btn;
    stickyObs.observe(ctaZone);
}

// Init
renderHistoryPanel();
</script>
</body>
</html>
